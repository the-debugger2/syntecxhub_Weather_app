<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" id="city-input" placeholder="Enter city name">
            <button id="search-btn"><img alt="search-icon" src="loupe.png"/></button>
        </div>
        <div class="weather-info">
            <h2 id="city">Weather in Lusaka</h2>
            <h1 id="temperature">58°C</h1>
            <div class="weather-container">
                <img src="" alt="weather-icon" id="icon" class="weather-icon" />
                <p class="description" id="description">Cloudy</p>
            </div>
            <p id="humidity">Humidity: 80%</p>
            <p id="wind">Wind Speed: 10 km/h</p>
        </div>
    </div>

</body>

</html>
